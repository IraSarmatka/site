  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --indigo:#2563EB;--indigo-light:#3B82F6;--indigo-pale:#DBEAFE;
      --indigo-mist:#EFF6FF;--cream:#faf9f6;--text:#1a1a2e;
      --text2:#4a4a6a;--text3:#9090aa;
      --border:rgba(37,99,235,0.12);--border2:rgba(37,99,235,0.22);
      --serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',sans-serif;
    }
    body{font-family:var(--sans);font-weight:300;color:var(--text2);background:var(--cream);line-height:1.75}

    /* NAV */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      padding:1rem 2.5rem;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(250,249,246,0.92);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo{font-family:var(--sans);font-size:1.1rem;font-weight:500;letter-spacing:.04em;color:var(--text);text-decoration:none}
    .btn-back{
      display:inline-flex;align-items:center;gap:.4rem;
      border:1px solid var(--border2);border-radius:3px;
      padding:7px 16px;font-size:13px;letter-spacing:.06em;
      color:var(--text2);text-decoration:none;
      font-family:var(--sans);font-weight:400;
      transition:all .2s;
    }
    .btn-back:hover{border-color:var(--indigo);color:var(--indigo)}
    .btn-back::before{content:'←';font-size:14px}

    /* HERO */
    .hero-bg{background:var(--cream);width:100%}
    .hero{
      display:grid;
      grid-template-columns:1fr 1fr;
      align-items:center;gap:3rem;
      padding:5.5rem 2.5rem 3.5rem;
      max-width:1080px;margin:0 auto;
    }
    .hero-tag{
      display:inline-flex;align-items:center;gap:.6rem;
      font-size:11px;letter-spacing:.14em;text-transform:uppercase;
      color:var(--indigo);margin-bottom:1.25rem;font-weight:500;
    }
    .hero-tag::before{content:'';width:20px;height:1px;background:var(--indigo)}
    .hero-text h1{
      font-family:var(--serif);
      font-size:clamp(3rem,4.5vw,4.5rem);
      font-weight:500;line-height:1.08;
      color:var(--text);margin-bottom:1rem;
    }
    .hero-subtitle{
      font-family:var(--serif);font-size:1.15rem;
      color:var(--indigo);line-height:1.5;
    }

    /* PHOTO */
    .hero-photo{position:relative;display:flex;flex-direction:column;align-items:center;gap:1rem;justify-self:center;text-align:center;width:100%}
    .photo-circle-wrap{
      width:240px;height:240px;border-radius:50%;
      overflow:hidden;position:relative;
      border:3px solid var(--indigo-pale);
      box-shadow:0 0 0 6px rgba(43,92,230,0.08);
    }
    .photo-circle-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top}

    /* POSTS SECTION */
    .section-bg{width:100%;background:var(--cream)}
    .section-bg.alt{background:var(--indigo-mist)}
    .section-inner{max-width:1080px;margin:0 auto;padding:4rem 2.5rem}
    .section-tag{
      font-size:11px;letter-spacing:.14em;text-transform:uppercase;
      color:var(--indigo);font-weight:500;margin-bottom:1rem;display:block;
    }
    .section-title{
      font-family:var(--serif);
      font-size:clamp(1.9rem,3vw,2.8rem);
      font-weight:500;color:var(--text);
      line-height:1.15;margin-bottom:2rem;
    }
    .section-title em{font-style:normal;color:var(--indigo);font-weight:400}

    /* Порожній стан */
    .empty-state{
      padding:3.5rem 2rem;text-align:center;
      background:#fff;border:1px solid var(--border);border-radius:4px;
    }
    .empty-state p{font-size:15px;color:var(--text3)}

    /* POSTS GRID */
    .posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
    .post-card{
      background:#fff;border:1px solid var(--border);border-radius:4px;
      padding:1.75rem 1.5rem;display:flex;flex-direction:column;gap:.75rem;
      transition:border-color .2s,box-shadow .2s;text-decoration:none;
    }
    .post-card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(37,99,235,0.08)}
    .post-date{font-size:12px;letter-spacing:.06em;color:var(--text3)}
    .post-title{font-family:var(--serif);font-size:clamp(1.2rem,2vw,1.5rem);font-weight:500;color:var(--text);line-height:1.2}
    .post-excerpt{font-size:14px;color:var(--text2);line-height:1.65;flex:1}
    .post-read{font-size:13px;letter-spacing:.06em;color:var(--indigo);margin-top:.5rem}

    /* SUBSCRIBE */
    .subscribe-inner{max-width:560px;margin:0 auto;padding:4rem 2.5rem;text-align:center}

    /* FOOTER */
    footer{
      border-top:1px solid var(--border);
      padding:1.5rem 2.5rem;
      display:flex;align-items:center;justify-content:space-between;
    }
    .footer-name{font-family:var(--serif);font-size:1rem;font-weight:500;color:var(--text)}
    .footer-links{display:flex;gap:1.25rem}
    .footer-links a{font-size:13px;letter-spacing:.06em;color:var(--text3);text-decoration:none;transition:color .2s}
    .footer-links a:hover{color:var(--indigo)}

    /* RESPONSIVE */
    @media(max-width:900px){
      nav{padding:1rem 1.5rem}
      .hero{grid-template-columns:1fr;gap:2rem;padding:4.5rem 1.5rem 2.5rem;text-align:center}
      .hero-photo{order:-1}
      .section-inner{padding:2.5rem 1.5rem}
      .subscribe-inner{padding:2.5rem 1.5rem}
      .posts-grid{grid-template-columns:1fr 1fr}
      footer{flex-direction:column;gap:1rem;text-align:center;padding:1.5rem}
    }
    @media(max-width:480px){
      .hero{padding:4rem 1.25rem 2rem}
      .photo-circle-wrap{width:180px;height:180px}
      .section-inner{padding:2rem 1.25rem}
      .posts-grid{grid-template-columns:1fr}
      .section-title{font-size:1.7rem}
    }
  </style>
</head>
